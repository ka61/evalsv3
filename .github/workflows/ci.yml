name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install inspect-ai openai anthropic ruff
      - name: Ruff format check
        run: ruff format --check .
      - name: Ruff lint
        run: ruff check .
      - name: Import-check example tasks
        run: |
          python - <<'PY'
          import importlib.util, pathlib
          for p in sorted(pathlib.Path("examples").rglob("task.py")):
              name = str(p).replace("/", "_").removesuffix(".py")
              spec = importlib.util.spec_from_file_location(name, p)
              mod = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(mod)
              print("ok:", p)
          PY
